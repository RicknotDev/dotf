name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Vet
        run: go vet ./...
      - name: Format
        run: go fmt ./...

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Test
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.txt
          fail_ci_if_error: false

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build
        run: go build -o dotf ./cmd/dotf
      - name: Create test repository
        run: |
          mkdir -p /tmp/test-repo/layers/base/.config
          mkdir -p /tmp/test-repo/layers/distro/arch/.config
          echo 'font_size 12' > /tmp/test-repo/layers/base/.config/kitty.conf
          echo 'font_size 14' > /tmp/test-repo/layers/distro/arch/.config/kitty.conf
      - name: Test dotf explain
        run: |
          cd /tmp/test-repo
          $GITHUB_WORKSPACE/dotf explain
      - name: Test dotf install --dry-run
        run: |
          cd /tmp/test-repo
          $GITHUB_WORKSPACE/dotf install --dry-run
      - name: Test dotf doctor
        run: |
          cd /tmp/test-repo
          $GITHUB_WORKSPACE/dotf doctor

  build:
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -ldflags="-s -w" -o dotf ./cmd/dotf
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotf-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dotf

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, unit-tests, integration-test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            dotf-linux-amd64/dotf \
            dotf-linux-arm64/dotf \
            --title "DOTF ${{ github.ref_name }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
